# Локальная инфраструктура для разработки my-pocket.
# Поднимает PostgreSQL для бэкенда (Nest.js + Prisma).
#
# Запуск:   docker compose up -d
# Остановка: docker compose down
# С удалением данных: docker compose down -v
#
# Креды и порт ниже совпадают с DATABASE_URL в apps/backend/.env.example:
#   DATABASE_URL="postgresql://postgres:postgres@localhost:5432/my_pocket?schema=public"

services:
  postgres:
    image: postgres:16-alpine
    container_name: my-pocket-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: my_pocket
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d my_pocket"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
